name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src/sslt \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=markdown:coverage.md

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.md

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [tests, coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag format
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid tag version format: v$TAG"
            echo "Expected forms like v1.2.3 or v1.2.3-rc1"
            exit 1
          fi

      - name: Preflight check PyPI version availability
        shell: bash
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          package = "sslt"
          version = os.environ["TAG_VERSION"]
          url = f"https://pypi.org/pypi/{package}/json"

          try:
              with urllib.request.urlopen(url, timeout=15) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"Package '{package}' is not on PyPI yet; continuing.")
                  raise SystemExit(0)
              raise

          releases = payload.get("releases", {})
          if version in releases:
              print(f"Version {version} already exists on PyPI for '{package}'.")
              print("Use a new tag/version (for example: v0.1.1).")
              print("PyPI does not allow reusing release filenames.")
              print("See: https://pypi.org/help/#file-name-reuse")
              raise SystemExit(1)

          print(f"PyPI preflight OK: {package} {version} not present in current release index.")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/sslt
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_PUBLISH_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
